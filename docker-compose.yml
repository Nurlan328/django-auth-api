services:
  db:
    image: postgres:16
    container_name: django_auth_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      # distinct host ports so this stack can run next to the FastAPI one
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: django_auth_redis
    ports:
      - "6380:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: django_auth_rabbitmq
    ports:
      - "5673:5672"       # AMQP — Celery connects here
      - "15673:15672"     # management UI: http://localhost:15673 (guest/guest)

volumes:
  pgdata:
